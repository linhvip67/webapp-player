<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🍿 Chọn Tập Phim</title>
    <style>
        body { background-color: #0b0f19; color: white; font-family: sans-serif; padding: 20px; text-align: center; margin: 0;}
        h2 { color: #e50914; margin-bottom: 20px;}
        
        /* Loading Text */
        #loading { margin-top: 50px; }

        /* Khung chọn Mùa */
        .season-tabs { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 10px; margin-bottom: 20px; justify-content: center;}
        .season-btn { background: #1c212e; border: 1px solid #2a2e39; color: #94a3b8; padding: 10px 20px; border-radius: 20px; cursor: pointer; white-space: nowrap; font-weight: bold; transition: 0.2s;}
        .season-btn.active { background: #e50914; color: #fff; border-color: #e50914;}
        
        /* Grid Chọn Tập */
        .episodes-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); gap: 10px; }
        .ep-btn { background: #1c212e; border: 1px solid #2a2e39; color: #fff; padding: 15px 5px; border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: bold; display: block; box-sizing: border-box; transition: 0.2s;}
        .ep-btn:active { transform: scale(0.95); background: #e50914;}

        /* Cuộn ngang */
        ::-webkit-scrollbar { height: 4px; }
        ::-webkit-scrollbar-thumb { background: #e50914; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="loading"><h3>🍿 Đang kết nối máy chủ phim...</h3></div>
    
    <div id="ui-container" style="display:none;">
        <h2>🎬 CHỌN TẬP PHIM</h2>
        <div class="season-tabs" id="season-tabs"></div>
        <div class="episodes-grid" id="episodes-grid"></div>
    </div>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
        window.Telegram.WebApp.expand();
        let seriesData = [];

        // Hàm render danh sách tập theo Mùa
        function renderEpisodes(seasonIndex) {
            const epsGrid = document.getElementById("episodes-grid");
            epsGrid.innerHTML = ""; 

            // Cập nhật tab active
            document.querySelectorAll('.season-btn').forEach((btn, idx) => {
                btn.classList.toggle('active', idx === seasonIndex);
            });

            // Lấy danh sách link của Mùa được chọn
            const episodes = seriesData[seasonIndex].episodes;
            episodes.forEach((url, idx) => {
                const btn = document.createElement("div");
                btn.className = "ep-btn";
                btn.innerText = "Tập " + (idx + 1);
                
                // MẸO CỐT LÕI: Biến tập phim thành "Phim lẻ" 
                btn.onclick = () => {
                    document.getElementById("ui-container").style.display = "none";
                    document.getElementById("loading").innerHTML = "<h3>🍿 Đang tải phim...</h3>";
                    document.getElementById("loading").style.display = "block";
                    
                    // Mã hóa riêng link của tập này
                    let singleLinkEncoded = btoa(unescape(encodeURIComponent(url)));
                    
                    // Lấy url gốc của WebApp (bỏ đi các params cũ)
                    let currentUrlBase = window.location.href.split('?')[0];
                    
                    // Reload trang WebApp với 1 link duy nhất -> Kích hoạt cơ chế "Phim Lẻ" chặn nhảy app!
                    window.location.replace(currentUrlBase + "?link=" + singleLinkEncoded);
                };
                epsGrid.appendChild(btn);
            });
        }

        function initApp() {
            const encodedLink = new URLSearchParams(window.location.search).get("link");
            if (!encodedLink) {
                document.getElementById("loading").innerHTML = "⚠️ Lỗi: Không có dữ liệu phim!";
                return;
            }

            // Giải mã an toàn để không lỗi font Tiếng Việt
            let decoded = "";
            try { 
                decoded = decodeURIComponent(escape(atob(encodedLink))); 
            } catch(e) { 
                decoded = atob(encodedLink); 
            }

            // ==========================================
            // LOGIC SỬA LỖI: NẾU LÀ PHIM LẺ (KHÔNG CÓ DẤU |)
            // ==========================================
            if (!decoded.includes("|") && !decoded.includes("||")) {
                // Chuyển hướng thẳng luôn, bỏ qua Menu chọn tập!
                window.location.replace(decoded.trim());
                return;
            }

            // ==========================================
            // LOGIC PHIM BỘ: DỰNG GIAO DIỆN MENU
            // ==========================================
            document.getElementById("loading").style.display = "none";
            document.getElementById("ui-container").style.display = "block";

            if (decoded.includes("||")) {
                // Kiểu: Có phân Mùa/Phần
                const seasonParts = decoded.split("||");
                seasonParts.forEach((part, idx) => {
                    let sName = "Phần " + (idx + 1);
                    let sLinks = part;
                    
                    if (part.includes("::")) {
                        const splitIdx = part.indexOf("::");
                        sName = part.substring(0, splitIdx).trim();
                        sLinks = part.substring(splitIdx + 2);
                    }
                    
                    seriesData.push({
                        name: sName,
                        episodes: sLinks.split("|").map(l => l.trim()).filter(l => l)
                    });
                });
            } else {
                // Kiểu: Chỉ có danh sách tập (không có Mùa)
                seriesData.push({
                    name: "Danh sách Tập",
                    episodes: decoded.split("|").map(l => l.trim()).filter(l => l)
                });
            }

            const sTabs = document.getElementById("season-tabs");
            // Render Tab Mùa nếu có nhiều hơn 1 mùa
            if (seriesData.length > 1) {
                seriesData.forEach((season, idx) => {
                    const btn = document.createElement("div");
                    btn.className = "season-btn";
                    btn.innerText = season.name;
                    btn.onclick = () => renderEpisodes(idx);
                    sTabs.appendChild(btn);
                });
            } else {
                sTabs.style.display = "none";
            }
            
            // Hiển thị danh sách tập của Mùa đầu tiên
            renderEpisodes(0);
        }

        try {
            initApp();
        } catch(e) {
            document.getElementById("loading").innerHTML = "⚠️ Lỗi hệ thống: " + e.message;
        }

        // Lớp bảo vệ UX cơ bản
        document.addEventListener('contextmenu', event => event.preventDefault());
    </script>
</body>
</html>
