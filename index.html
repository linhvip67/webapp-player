<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🍿 Xem Phim Subteam</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background-color: #0b0f19; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; color: white; overflow-x: hidden; }
        
        /* 🎬 KHUNG VIDEO SẠCH 100% (Đã xóa Watermark) */
        .video-wrapper { width: 100vw; aspect-ratio: 16/9; background: #000; position: relative; overflow: hidden; border-bottom: 1px solid #2a2e39; }
        
        /* IFRAME: Cho phép Full-screen tự do, nhưng bị khóa chặt trong Sandbox để chặn nhảy App */
        iframe { width: 100%; height: 100%; border: none; outline: none; display: block; position: relative; z-index: 5; }
        
        /* 📋 GIAO DIỆN MÙA & TẬP (Tối ưu Cảm ứng) */
        .controls-container { padding: 15px; display: none; }
        
        /* Thanh Tab Mùa vuốt ngang */
        .season-tabs { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 12px; margin-bottom: 15px; border-bottom: 1px solid #1c212e; scrollbar-width: none; }
        .season-tabs::-webkit-scrollbar { display: none; }
        .season-btn { background: transparent; border: 1px solid #2a2e39; color: #94a3b8; padding: 8px 18px; border-radius: 20px; font-size: 14px; white-space: nowrap; font-weight: 600; cursor: pointer; transition: 0.2s; }
        .season-btn.active { background: #e50914; color: #fff; border-color: #e50914; }

        /* Lưới Nút Tập */
        .episodes-grid { display: flex; flex-wrap: wrap; gap: 10px; }
        .ep-btn { background: #1c212e; border: 1px solid #2a2e39; color: #cbd5e1; padding: 12px 10px; border-radius: 8px; font-size: 14px; font-weight: 600; text-align: center; cursor: pointer; flex: 1 1 calc(25% - 10px); min-width: 65px; transition: 0.15s; }
        .ep-btn:active { transform: scale(0.95); }
        .ep-btn.active { background: #fff; color: #000; border-color: #fff; box-shadow: 0 0 10px rgba(255,255,255,0.2); }
        
        #error-msg { text-align: center; color: #ef4444; padding: 20px; font-weight: bold; display: none; }
    </style>
</head>
<body>

    <div class="video-wrapper">
        <iframe id="video-frame" src="" sandbox="allow-scripts allow-same-origin allow-presentation" allow="autoplay; fullscreen" allowfullscreen="true" webkitallowfullscreen="true" mozallowfullscreen="true"></iframe>
    </div>
    
    <div id="error-msg">⚠️ Lỗi: Không tìm thấy dữ liệu phim!</div>

    <div class="controls-container" id="controls-ui">
        <div class="season-tabs" id="season-tabs"></div>
        <div class="episodes-grid" id="episodes-grid"></div>
    </div>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
        window.Telegram.WebApp.expand();

        let seriesData = [];
        let currentSeasonIndex = 0;

        // 🚀 THUẬT TOÁN ÉP STREAM (Hoạt động ngầm)
        function forceStreamPlayer(rawUrl) {
            let u = rawUrl.trim();
            // Code tự động ép link thô thành luồng Stream để chặn tải, chặn nhảy app
            // M không cần phải sửa link thủ công trong Sheet nữa.
            if (!u.includes("action=embedview")) {
                u += (u.includes("?") ? "&" : "?") + "action=embedview&wmode=transparent";
            }
            return u;
        }

        function playEpisode(url, epBtn) {
            // Nạp link đã qua xử lý ép Stream vào Iframe
            document.getElementById("video-frame").src = forceStreamPlayer(url);

            document.querySelectorAll('.ep-btn').forEach(btn => btn.classList.remove('active'));
            if(epBtn) epBtn.classList.add('active');
        }

        function renderEpisodes(seasonIdx) {
            currentSeasonIndex = seasonIdx;
            const epsGrid = document.getElementById("episodes-grid");
            epsGrid.innerHTML = ""; 

            document.querySelectorAll('.season-btn').forEach((btn, idx) => {
                btn.classList.toggle('active', idx === seasonIdx);
            });

            const episodes = seriesData[seasonIdx].episodes;
            episodes.forEach((url, idx) => {
                const btn = document.createElement("div");
                btn.className = "ep-btn";
                btn.innerText = "Tập " + (idx + 1);
                btn.onclick = () => playEpisode(url, btn);
                epsGrid.appendChild(btn);
            });

            // Tự động phát tập đầu của mùa
            epsGrid.firstChild.click();
        }

        function initApp() {
            const urlParams = new URLSearchParams(window.location.search);
            const encodedLink = urlParams.get("link");
            if (!encodedLink) {
                document.getElementById("error-msg").style.display = "block"; return;
            }

            const decoded = decodeURIComponent(escape(atob(encodedLink))); 

            // CẤU TRÚC PHÂN TÁCH MÙA TẬP
            if (decoded.includes("||")) {
                const seasons = decoded.split("||");
                seasons.forEach((seasonStr, index) => {
                    let sName = "Phần " + (index + 1);
                    let sLinks = seasonStr;
                    
                    if (seasonStr.includes("::")) {
                        const parts = seasonStr.split("::");
                        sName = parts[0].trim();
                        sLinks = parts[1];
                    }
                    
                    const eps = sLinks.split("|").map(l => l.trim()).filter(l => l);
                    if (eps.length > 0) seriesData.push({ name: sName, episodes: eps });
                });
            } else if (decoded.includes("|")) {
                const eps = decoded.split("|").map(l => l.trim()).filter(l => l);
                seriesData.push({ name: "Danh sách Tập", episodes: eps });
            } else {
                seriesData.push({ name: "Phim Lẻ", episodes: [decoded.trim()] });
            }

            // DỰNG GIAO DIỆN
            if (seriesData.length > 0) {
                if (seriesData.length > 1 || seriesData[0].episodes.length > 1) {
                    document.getElementById("controls-ui").style.display = "block";
                    
                    const sTabs = document.getElementById("season-tabs");
                    if (seriesData.length > 1) {
                        seriesData.forEach((season, idx) => {
                            const btn = document.createElement("button");
                            btn.className = "season-btn";
                            btn.innerText = season.name;
                            btn.onclick = () => renderEpisodes(idx);
                            sTabs.appendChild(btn);
                        });
                    } else {
                        sTabs.style.display = "none";
                    }
                    renderEpisodes(0);
                } else {
                    playEpisode(seriesData[0].episodes[0]);
                }
            } else {
                document.getElementById("error-msg").style.display = "block";
            }
        }

        initApp();
        document.addEventListener('contextmenu', event => event.preventDefault());
    </script>
</body>
</html>
