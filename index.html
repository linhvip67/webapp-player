<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🍿 Chọn Tập Phim</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; min-height: 100%; background-color: #0b0f19; font-family: sans-serif; color: white;}
        
        /* Tiêu đề */
        .header { text-align: center; padding: 20px; background: #1c212e; border-bottom: 2px solid #e50914; font-size: 18px; font-weight: bold;}
        
        /* Khung chọn Mùa & Tập */
        .controls-container { padding: 20px; display: none; }
        
        /* Tab Mùa */
        .season-tabs { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 15px; border-bottom: 1px solid #2a2e39; margin-bottom: 20px; }
        .season-btn { background: #1c212e; border: 1px solid #2a2e39; color: #94a3b8; padding: 10px 20px; border-radius: 20px; cursor: pointer; white-space: nowrap; font-weight: bold; font-size: 15px;}
        .season-btn.active { background: #e50914; color: #fff; border-color: #e50914; }
        
        /* Grid Tập */
        .episodes-grid { display: flex; flex-wrap: wrap; gap: 12px; }
        .ep-btn { background: #1c212e; border: 1px solid #2a2e39; color: #fff; padding: 15px 10px; border-radius: 8px; cursor: pointer; text-align: center; font-size: 15px; flex: 1 1 calc(25% - 12px); box-sizing: border-box; min-width: 75px; font-weight: bold;}
        .ep-btn:active { background: #e50914; }
        
        #error-msg { text-align: center; padding: 30px; display: none; color: #ff4d4f; font-weight: bold; font-size: 16px;}
        
        /* Tùy chỉnh thanh cuộn ngang */
        ::-webkit-scrollbar { height: 4px; }
        ::-webkit-scrollbar-thumb { background: #e50914; border-radius: 10px; }
    </style>
</head>
<body>
    <div class="header" id="movie-title">🎬 DANH SÁCH TẬP PHIM</div>
    
    <div id="error-msg">⚠️ Lỗi: Không thể tải dữ liệu phim!</div>

    <!-- UI Các Nút Chọn Tập -->
    <div class="controls-container" id="controls-ui">
        <div class="season-tabs" id="season-tabs"></div>
        <div class="episodes-grid" id="episodes-grid"></div>
    </div>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
        window.Telegram.WebApp.expand();
        let seriesData = [];

        function playEpisode(url) {
            // Chuyển hướng trình duyệt Telegram thẳng sang link SharePoint
            // Xem xong khách ấn Back là về lại Menu tập
            window.location.href = url;
        }

        function renderEpisodes(seasonIndex) {
            const epsGrid = document.getElementById("episodes-grid");
            epsGrid.innerHTML = ""; 

            document.querySelectorAll('.season-btn').forEach((btn, idx) => {
                btn.classList.toggle('active', idx === seasonIndex);
            });

            const episodes = seriesData[seasonIndex].episodes;
            episodes.forEach((url, idx) => {
                const btn = document.createElement("div");
                btn.className = "ep-btn";
                btn.innerText = "Tập " + (idx + 1);
                btn.onclick = () => playEpisode(url);
                epsGrid.appendChild(btn);
            });
        }

        function initPlayer() {
            const encodedLink = new URLSearchParams(window.location.search).get("link");
            if (!encodedLink) throw new Error("No link");

            const decoded = decodeURIComponent(escape(atob(encodedLink))); 

            if (decoded.includes("||")) {
                // PHIM CÓ NHIỀU MÙA
                const seasonParts = decoded.split("||");
                seasonParts.forEach((part, idx) => {
                    let sName = "Phần " + (idx + 1);
                    let sLinks = part;
                    
                    if (part.includes("::")) {
                        const splitIdx = part.indexOf("::");
                        sName = part.substring(0, splitIdx).trim();
                        sLinks = part.substring(splitIdx + 2);
                    }
                    
                    seriesData.push({
                        name: sName,
                        episodes: sLinks.split("|").map(l => l.trim()).filter(l => l)
                    });
                });
            } else if (decoded.includes("|")) {
                // PHIM BỘ CHỈ CÓ 1 MÙA
                seriesData.push({
                    name: "Danh sách Tập",
                    episodes: decoded.split("|").map(l => l.trim()).filter(l => l)
                });
            } else {
                // PHIM LẺ: CHUYỂN HƯỚNG TỚI LUÔN, KHÔNG HIỆN MENU CỌC CẠCH NỮA
                window.location.replace(decoded.trim());
                return;
            }

            // DỰNG GIAO DIỆN NẾU LÀ PHIM BỘ
            if (seriesData.length > 0) {
                document.getElementById("controls-ui").style.display = "block";
                const sTabs = document.getElementById("season-tabs");
                
                if (seriesData.length > 1) {
                    seriesData.forEach((season, idx) => {
                        const btn = document.createElement("div");
                        btn.className = "season-btn";
                        btn.innerText = season.name;
                        btn.onclick = () => renderEpisodes(idx);
                        sTabs.appendChild(btn);
                    });
                } else {
                    sTabs.style.display = "none";
                }
                renderEpisodes(0);
            }
        }

        try {
            initPlayer();
        } catch (e) {
            document.getElementById("error-msg").style.display = "block";
            document.getElementById("controls-ui").style.display = "none";
        }

        // Chống F12, vô hiệu hóa menu chuột phải
        document.addEventListener('contextmenu', event => event.preventDefault());
        document.onkeydown = function(e) { if (e.keyCode == 123 || (e.ctrlKey && e.shiftKey) || e.ctrlKey) return false; }
    </script>
</body>
</html>
