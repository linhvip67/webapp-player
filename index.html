<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🍿 Đang tải phim...</title>
    <style>
        body { background-color: #000; color: #fff; text-align: center; padding-top: 50px; font-family: sans-serif; }
    </style>
</head>
<body>
    <h3 id="status">🍿 Đang kết nối máy chủ phim...</h3>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
        window.Telegram.WebApp.expand();
        const encodedLink = new URLSearchParams(window.location.search).get("link");
        if (encodedLink) {
            // Chuyển thẳng WebApp sang trang SharePoint gốc để né mọi lớp chặn bảo mật
            window.location.replace(atob(encodedLink)); 
        } else {
            document.getElementById("status").innerText = "⚠️ Lỗi: Không tìm thấy dữ liệu phim!";
        }
    </script>
</body>
</html>
