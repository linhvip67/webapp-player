<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🍿 Bảng Điều Khiển Phim</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background-color: #0b0f19; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; color: white; }
        
        /* Tiêu đề trang */
        .header { 
            text-align: center; 
            padding: 20px; 
            background: #1c212e; 
            border-bottom: 2px solid #e50914; 
            font-size: 18px; 
            font-weight: bold; 
            text-transform: uppercase; 
            color: #f1c40f; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .controls-container { padding: 20px; }
        
        /* Lưới Nút Mùa */
        .season-tabs { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 15px; margin-bottom: 20px; border-bottom: 1px solid #2a2e39; scrollbar-width: none; }
        .season-tabs::-webkit-scrollbar { display: none; }
        .season-btn { background: #111520; border: 1px solid #2a2e39; color: #94a3b8; padding: 10px 20px; border-radius: 25px; font-size: 15px; white-space: nowrap; font-weight: bold; cursor: pointer; transition: 0.2s; box-shadow: 0 2px 5px rgba(0,0,0,0.3); }
        .season-btn.active { background: #e50914; color: #fff; border-color: #e50914; }

        /* Lưới Nút Tập (Làm to ra để dễ bấm trên điện thoại) */
        .episodes-grid { display: flex; flex-wrap: wrap; gap: 15px; }
        .ep-btn { 
            background: #1c212e; 
            border: 1px solid #2a2e39; 
            color: #e2e8f0; 
            padding: 15px 10px; 
            border-radius: 12px; 
            font-size: 16px; 
            font-weight: bold; 
            text-align: center; 
            cursor: pointer; 
            flex: 1 1 calc(33.33% - 15px); 
            min-width: 80px; 
            transition: 0.2s; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
        }
        .ep-btn:active { transform: scale(0.92); background: #334155; }
        
        #error-msg { text-align: center; color: #ef4444; padding: 30px; font-weight: bold; display: none; font-size: 16px;}
        .instruction { text-align: center; color: #94a3b8; font-size: 14px; margin-bottom: 20px; font-style: italic; }
    </style>
</head>
<body>

    <div class="header">🎬 DANH SÁCH TẬP PHIM</div>
    
    <div id="error-msg">⚠️ Lỗi: Không tìm thấy dữ liệu phim!</div>

    <div class="controls-container" id="controls-ui" style="display: none;">
        <div class="instruction">👇 Chọn tập để tự động mở trình phát video 👇</div>
        <div class="season-tabs" id="season-tabs"></div>
        <div class="episodes-grid" id="episodes-grid"></div>
    </div>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
        window.Telegram.WebApp.expand();
        
        let seriesData = [];

        function playEpisode(url) {
            // ĐÒN CHỐT HẠ: Chuyển hướng trình duyệt thẳng tới link Microsoft
            // Không bị kẹt trong Iframe, không bao giờ lỗi Refused to connect!
            window.location.href = url.trim();
        }

        function renderEpisodes(seasonIdx) {
            const epsGrid = document.getElementById("episodes-grid");
            epsGrid.innerHTML = ""; 

            document.querySelectorAll('.season-btn').forEach((btn, idx) => {
                btn.classList.toggle('active', idx === seasonIdx);
            });

            const episodes = seriesData[seasonIdx].episodes;
            episodes.forEach((url, idx) => {
                const btn = document.createElement("div");
                btn.className = "ep-btn";
                btn.innerText = "Tập " + (idx + 1);
                btn.onclick = () => playEpisode(url);
                epsGrid.appendChild(btn);
            });
        }

        function initApp() {
            const urlParams = new URLSearchParams(window.location.search);
            const encodedLink = urlParams.get("link");
            
            if (!encodedLink) {
                document.getElementById("error-msg").style.display = "block"; return;
            }

            const decoded = decodeURIComponent(escape(atob(encodedLink))); 

            // CẤU TRÚC PHÂN TÁCH MÙA TẬP
            if (decoded.includes("||")) {
                const seasons = decoded.split("||");
                seasons.forEach((seasonStr, index) => {
                    let sName = "Phần " + (index + 1);
                    let sLinks = seasonStr;
                    
                    if (seasonStr.includes("::")) {
                        const parts = seasonStr.split("::");
                        sName = parts[0].trim();
                        sLinks = parts[1];
                    }
                    
                    const eps = sLinks.split("|").map(l => l.trim()).filter(l => l);
                    if (eps.length > 0) seriesData.push({ name: sName, episodes: eps });
                });
            } else if (decoded.includes("|")) {
                const eps = decoded.split("|").map(l => l.trim()).filter(l => l);
                seriesData.push({ name: "Danh sách Tập", episodes: eps });
            } else {
                // Nếu là phim lẻ 1 tập, tự động nhảy thẳng vào phim luôn, bỏ qua Menu!
                playEpisode(decoded.trim());
                return;
            }

            // DỰNG GIAO DIỆN MENU
            if (seriesData.length > 0) {
                document.getElementById("controls-ui").style.display = "block";
                const sTabs = document.getElementById("season-tabs");
                
                if (seriesData.length > 1) {
                    seriesData.forEach((season, idx) => {
                        const btn = document.createElement("button");
                        btn.className = "season-btn";
                        btn.innerText = season.name;
                        btn.onclick = () => renderEpisodes(idx);
                        sTabs.appendChild(btn);
                    });
                } else {
                    sTabs.style.display = "none";
                }
                
                renderEpisodes(0);
            } else {
                document.getElementById("error-msg").style.display = "block";
            }
        }

        initApp();
    </script>
</body>
</html>
