<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🍿 Xem Phim Subteam</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background-color: #0b0f19; overflow-x: hidden; font-family: sans-serif; color: white;}
        
        /* KHUNG VIDEO GỐC */
        .video-container { 
            width: 100vw; 
            aspect-ratio: 16/9; 
            background: #000; 
            position: relative; 
            overflow: hidden; 
            border-bottom: 2px solid #2a2e39;
            transition: all 0.2s ease;
        }

        /* 🚀 CSS KÍCH HOẠT CHẾ ĐỘ FULL-SCREEN CHO KHUNG (GIỮ WATERMARK) */
        .video-container.fullscreen-mode {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; 
            height: 100vh;
            max-height: none;
            z-index: 999999;
            border-bottom: none;
            aspect-ratio: auto;
        }

        iframe { width: 100%; height: 100%; border: none; outline: none; }
        
        /* 🔲 NÚT PHÓNG TO TỰ CHẾ */
        .custom-fs-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(0, 0, 0, 0.4);
            color: rgba(255, 255, 255, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            z-index: 10;
            font-size: 12px;
            transition: 0.2s;
        }
        .custom-fs-btn:active { background: rgba(0,0,0,0.8); }

        /* 🛡️ WATERMARK MỜ, CHẬM RÃI, KHÔNG VIỀN */
        #watermark {
            position: absolute;
            color: rgba(255, 255, 255, 0.12); /* Trắng mờ 12%, cực tinh tế */
            font-size: 16px;
            font-weight: normal; /* Bỏ in đậm nếu m muốn nó mỏng manh hơn */
            pointer-events: none;
            user-select: none;
            z-index: 9;
            /* Tăng thời gian lên 80s cho nó trôi lờ đờ như đám mây */
            animation: floatWatermark 80s infinite alternate linear; 
        }

        @keyframes floatWatermark {
            0% { top: 10%; left: 5%; }
            25% { top: 80%; left: 60%; }
            50% { top: 20%; left: 80%; }
            75% { top: 75%; left: 15%; }
            100% { top: 40%; left: 45%; }
        }

        .controls-container { padding: 20px; display: none; }
        h3 { color: #f1c40f; margin: 0 0 15px 0; text-transform: uppercase; font-size: 16px;}
        .episodes-grid { display: flex; flex-wrap: wrap; gap: 10px; }
        .ep-btn { background: #1c212e; border: 1px solid #2a2e39; color: #fff; padding: 12px; border-radius: 8px; cursor: pointer; text-align: center; font-size: 14px; flex: 1 1 calc(25% - 10px); box-sizing: border-box; min-width: 70px; font-weight: bold; transition: 0.2s;}
        .ep-btn:active { transform: scale(0.95); }
        .ep-btn.playing { background: #e50914; color: #fff; border-color: #e50914; font-weight: bold; }
    </style>
</head>
<body>

    <div class="video-container" id="vid-container">
        <button id="fs-btn" class="custom-fs-btn" onclick="toggleFullscreen()">⛶ Phóng to</button>
        
        <div id="watermark">UID: Đang tải...</div>
        
        <iframe id="video-frame" src="" allow="autoplay" sandbox="allow-scripts allow-same-origin allow-presentation"></iframe>
    </div>
    
    <div class="controls-container" id="controls-ui">
        <h3>🎬 Chọn tập phim:</h3>
        <div class="episodes-grid" id="episodes-grid"></div>
    </div>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
        window.Telegram.WebApp.expand();
        const urlParams = new URLSearchParams(window.location.search);
        document.getElementById("watermark").innerText = "AZ5_UID: " + (urlParams.get("uid") || "Ẩn Danh");

        // 🚀 Hàm Mở/Tắt Full-screen thủ công bảo vệ Watermark
        function toggleFullscreen() {
            const container = document.getElementById("vid-container");
            const btn = document.getElementById("fs-btn");
            
            // Ép full toàn màn hình bằng CSS (Đảm bảo hoạt động 100% trên iPhone)
            container.classList.toggle("fullscreen-mode");
            
            if (container.classList.contains("fullscreen-mode")) {
                btn.innerHTML = "✖ Thu nhỏ";
                // Ép thêm API Full-screen thật của Android/PC để giấu thanh trạng thái pin/wifi
                try {
                    if (container.requestFullscreen) container.requestFullscreen();
                    else if (container.webkitRequestFullscreen) container.webkitRequestFullscreen();
                } catch(e) {}
            } else {
                btn.innerHTML = "⛶ Phóng to";
                try {
                    if (document.exitFullscreen) document.exitFullscreen();
                    else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
                } catch(e) {}
            }
        }

        function cleanUrl(url) {
            let u = url.trim();
            // Lần này KHÔNG thêm fs=1 nữa vì mình đã dùng nút tự chế
            if (u.includes("sharepoint.com") || u.includes("1drv.ms")) {
                if (!u.includes("action=embedview")) {
                    u += (u.includes("?") ? "&" : "?") + "action=embedview&wmode=transparent";
                }
            }
            return u;
        }

        function playEpisode(url, epBtn) {
            document.getElementById("video-frame").src = cleanUrl(url);
            document.querySelectorAll('.ep-btn').forEach(btn => btn.classList.remove('playing'));
            if(epBtn) epBtn.classList.add('playing');
        }

        function init() {
            const encodedLink = urlParams.get("link");
            if(!encodedLink) return;

            const decoded = decodeURIComponent(escape(atob(encodedLink))); 
            let eps = decoded.split("|").map(l => l.trim()).filter(l => l);
            
            if (eps.length > 0) {
                if (eps.length > 1) {
                    document.getElementById("controls-ui").style.display = "block";
                    eps.forEach((url, idx) => {
                        const btn = document.createElement("div");
                        btn.className = "ep-btn";
                        btn.innerText = "Tập " + (idx + 1);
                        btn.onclick = () => playEpisode(url, btn);
                        document.getElementById("episodes-grid").appendChild(btn);
                    });
                    playEpisode(eps[0], document.querySelector('.ep-btn'));
                } else {
                    playEpisode(eps[0]);
                }
            }
        }
        
        init();
    </script>
</body>
</html>
