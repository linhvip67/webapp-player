<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🍿 Xem Phim Subteam</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background-color: #0b0f19; overflow-x: hidden; font-family: sans-serif; color: white;}
        
        /* 🎬 KHUNG PHÁT VIDEO CHUẨN (TỈ LỆ 16:9) */
        .video-container { width: 100%; aspect-ratio: 16/9; background: #000; position: relative; overflow: hidden; border-bottom: 2px solid #2a2e39;}
        iframe { width: 100%; height: 100%; border: none; outline: none; }
        
        #error-msg { text-align: center; padding: 20px; display: none; color: #ff4d4f; font-weight: bold;}

        /* 📋 KHUNG CHỌN TẬP PHIM BÊN DƯỚI */
        .controls-container { padding: 20px; display: none; }
        h3 { color: #f1c40f; margin: 0 0 15px 0; text-transform: uppercase; font-size: 18px; text-align: left;}
        
        /* Tab Mùa (Nếu có) */
        .season-tabs { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 12px; border-bottom: 1px solid #2a2e39; margin-bottom: 15px; }
        .season-btn { background: #1c212e; border: 1px solid #2a2e39; color: #94a3b8; padding: 8px 18px; border-radius: 20px; cursor: pointer; white-space: nowrap; font-weight: bold; transition: 0.2s;}
        .season-btn.active { background: #e50914; color: #fff; border-color: #e50914; }

        /* Grid Nút Tập phim */
        .episodes-grid { display: flex; flex-wrap: wrap; gap: 10px; }
        .ep-btn { background: #1c212e; border: 1px solid #2a2e39; color: #fff; padding: 12px; border-radius: 8px; cursor: pointer; text-align: center; font-size: 14px; flex: 1 1 calc(25% - 10px); box-sizing: border-box; min-width: 70px; font-weight: bold; transition: 0.2s;}
        .ep-btn:active { transform: scale(0.95); }
        .ep-btn.playing { background: #e50914; color: #fff; border-color: #e50914; font-weight: bold; box-shadow: 0 0 10px rgba(229, 9, 20, 0.5);}
        
        /* 🛡️ WATERMARK BẤT TỬ ĐÈ LÊN IFRAME */
        #watermark {
            position: absolute; /* Khóa chặt trong khung video */
            color: rgba(255, 255, 255, 0.25); /* Độ mờ 25% */
            font-size: 16px;
            font-weight: bold;
            font-family: monospace;
            pointer-events: none; /* Khách bấm xuyên qua chữ, không ảnh hưởng thao tác play/pause */
            user-select: none;
            z-index: 9999;
            text-shadow: 1px 1px 3px #000;
            animation: floatWatermark 18s infinite alternate ease-in-out;
        }

        @keyframes floatWatermark {
            0% { top: 5%; left: 5%; transform: rotate(-5deg); }
            25% { top: 75%; left: 60%; transform: rotate(10deg); }
            50% { top: 15%; left: 70%; transform: rotate(-10deg); }
            75% { top: 80%; left: 10%; transform: rotate(5deg); }
            100% { top: 40%; left: 35%; transform: rotate(0deg); }
        }

        ::-webkit-scrollbar { height: 4px; }
        ::-webkit-scrollbar-thumb { background: #e50914; border-radius: 10px; }
    </style>
</head>
<body>

    <div class="video-container" id="vid-container">
        <div id="watermark">UID: Đang tải...</div>
        
        <iframe id="video-frame" src="" allowfullscreen="true" webkitallowfullscreen="true" mozallowfullscreen="true"></iframe>
    </div>
    
    <div id="error-msg">⚠️ Lỗi: Không thể kết nối dữ liệu phim!</div>

    <div class="controls-container" id="controls-ui">
        <div class="season-tabs" id="season-tabs"></div>
        <div class="episodes-grid" id="episodes-grid"></div>
    </div>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        // Nạp UID của khách làm Watermark
        const urlParams = new URLSearchParams(window.location.search);
        const uid = urlParams.get("uid") || "Ẩn Danh";
        document.getElementById("watermark").innerText = "AZ5_UID: " + uid;

        let seriesData = [];

        // Trích xuất link nếu admin copy nhầm nguyên cái <iframe...> vào sheet
        function cleanEmbedUrl(url) {
            let cleanUrl = url.trim();
            if (cleanUrl.toLowerCase().startsWith("<iframe")) {
                const match = cleanUrl.match(/src=["'](.*?)["']/);
                if (match && match[1]) {
                    cleanUrl = match[1];
                }
            }
            return cleanUrl;
        }

        // Đổi tập phim trên Iframe
        function playEpisode(url, epBtn) {
            const iframe = document.getElementById("video-frame");
            
            // Xử lý link sạch sẽ trước khi đưa vào iframe
            iframe.src = cleanEmbedUrl(url);

            // Đổi màu nút tập đang chọn
            document.querySelectorAll('.ep-btn').forEach(btn => btn.classList.remove('playing'));
            if(epBtn) epBtn.classList.add('playing');
            
            // Cuộn mượt lên trên cùng (chỗ có video) khi bấm đổi tập
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // Tạo danh sách nút bấm tập phim
        function renderEpisodes(seasonIndex) {
            const epsGrid = document.getElementById("episodes-grid");
            epsGrid.innerHTML = ""; 

            document.querySelectorAll('.season-btn').forEach((btn, idx) => {
                btn.classList.toggle('active', idx === seasonIndex);
            });

            const episodes = seriesData[seasonIndex].episodes;
            episodes.forEach((url, idx) => {
                const btn = document.createElement("div");
                btn.className = "ep-btn";
                btn.innerText = "Tập " + (idx + 1);
                btn.onclick = () => playEpisode(url, btn);
                epsGrid.appendChild(btn);
            });
        }

        function initPlayer() {
            const encodedLink = urlParams.get("link");
            if (!encodedLink) throw new Error("No link");

            const decoded = decodeURIComponent(escape(atob(encodedLink))); 

            if (decoded.includes("||")) {
                const seasonParts = decoded.split("||");
                seasonParts.forEach((part, idx) => {
                    let sName = "Phần " + (idx + 1);
                    let sLinks = part;
                    
                    if (part.includes("::")) {
                        const splitIdx = part.indexOf("::");
                        sName = part.substring(0, splitIdx).trim();
                        sLinks = part.substring(splitIdx + 2);
                    }
                    seriesData.push({ name: sName, episodes: sLinks.split("|").map(l => l.trim()).filter(l => l) });
                });
            } else if (decoded.includes("|")) {
                seriesData.push({ name: "Danh sách Tập", episodes: decoded.split("|").map(l => l.trim()).filter(l => l) });
            } else {
                seriesData.push({ name: "Phim Lẻ", episodes: [decoded.trim()] });
            }

            if (seriesData.length > 0) {
                if (seriesData.length > 1 || seriesData[0].episodes.length > 1) {
                    document.getElementById("controls-ui").style.display = "block";
                    
                    const sTabs = document.getElementById("season-tabs");
                    if (seriesData.length > 1) {
                        seriesData.forEach((season, idx) => {
                            const btn = document.createElement("div");
                            btn.className = "season-btn";
                            btn.innerText = season.name;
                            btn.onclick = () => renderEpisodes(idx);
                            sTabs.appendChild(btn);
                        });
                    } else {
                        sTabs.style.display = "none";
                    }
                    
                    // Khởi tạo mùa 1 và tập 1
                    renderEpisodes(0);
                    const firstBtn = document.querySelector('.ep-btn');
                    playEpisode(seriesData[0].episodes[0], firstBtn);
                } else {
                    // Nếu là phim lẻ
                    playEpisode(seriesData[0].episodes[0]);
                }
            }
        }

        try {
            initPlayer();
        } catch (e) {
            document.getElementById("error-msg").style.display = "block";
            document.getElementById("vid-container").style.display = "none";
        }

        // Chặn inspect F12 và chuột phải
        document.addEventListener('contextmenu', event => event.preventDefault());
        document.onkeydown = function(e) { if (e.keyCode == 123 || (e.ctrlKey && e.shiftKey) || e.ctrlKey) return false; }
    </script>
</body>
</html>
