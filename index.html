<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🍿 Xem Phim Subteam</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/plyr@3.7.8/dist/plyr.css" />
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background-color: #000; overflow: hidden; }
        .video-container { width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; }
        video { width: 100%; max-height: 100%; }
        #error-msg { color: #fff; text-align: center; padding: 20px; font-family: sans-serif; display: none; }
    </style>
</head>
<body>
    <div class="video-container" id="vid-container">
        <video id="player" playsinline controls>
            <source id="video-src" src="" type="video/mp4" />
        </video>
    </div>
    <div id="error-msg">⚠️ Không thể tải video hoặc link đã hỏng!</div>

    <script src="https://cdn.jsdelivr.net/npm/plyr@3.7.8/dist/plyr.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        const encodedLink = new URLSearchParams(window.location.search).get("link");

        if (encodedLink) {
            try {
                // Nhận link đã mã hóa từ Cloudflare
                document.getElementById("video-src").src = atob(encodedLink);
                new Plyr('#player', {
                    controls: ['play-large', 'play', 'progress', 'current-time', 'duration', 'mute', 'volume', 'fullscreen']
                });
            } catch (e) {
                document.getElementById("error-msg").style.display = "block";
                document.getElementById("vid-container").style.display = "none";
            }
        } else {
            document.getElementById("error-msg").style.display = "block";
            document.getElementById("vid-container").style.display = "none";
        }

        // Lớp khiên bảo vệ: Chặn soi link, F12
        document.addEventListener('contextmenu', event => event.preventDefault());
        document.onkeydown = function(e) {
            if (e.keyCode == 123 || (e.ctrlKey && e.shiftKey) || e.ctrlKey) return false;
        }
    </script>
</body>
</html>
