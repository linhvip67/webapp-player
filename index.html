<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🍿 Chọn Tập Phim</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; min-height: 100vh; background-color: #0b0f19; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; color: white; }
        
        .header { background: #1c212e; padding: 20px; text-align: center; border-bottom: 2px solid #e50914; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        .header h2 { margin: 0; color: #fff; font-size: 20px; text-transform: uppercase; letter-spacing: 1px; }
        .header p { margin: 5px 0 0 0; color: #94a3b8; font-size: 13px; }

        .controls-container { padding: 20px; }
        
        /* Thanh Tab Mùa */
        .season-tabs { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 12px; margin-bottom: 20px; border-bottom: 1px solid #1c212e; scrollbar-width: none; }
        .season-tabs::-webkit-scrollbar { display: none; }
        .season-btn { background: #1c212e; border: 1px solid #2a2e39; color: #94a3b8; padding: 10px 20px; border-radius: 20px; font-size: 15px; white-space: nowrap; font-weight: 600; cursor: pointer; transition: 0.2s; }
        .season-btn.active { background: #e50914; color: #fff; border-color: #e50914; box-shadow: 0 0 10px rgba(229, 9, 20, 0.4); }

        /* Lưới Nút Tập */
        .episodes-grid { display: flex; flex-wrap: wrap; gap: 12px; }
        .ep-btn { background: #1c212e; border: 1px solid #2a2e39; color: #fff; padding: 15px 10px; border-radius: 10px; font-size: 15px; font-weight: 600; text-align: center; cursor: pointer; flex: 1 1 calc(33.333% - 12px); min-width: 80px; transition: 0.15s; display: flex; justify-content: center; align-items: center; gap: 5px; }
        .ep-btn:active { transform: scale(0.95); background: #2a2e39; }
        .ep-btn::before { content: '▶'; font-size: 12px; color: #e50914; }
        
        #error-msg { text-align: center; color: #ef4444; padding: 40px 20px; font-weight: bold; display: none; font-size: 16px; }
    </style>
</head>
<body>

    <div class="header">
        <h2>🎬 Kho Phim Subteam</h2>
        <p>Bấm vào tập phim để xem ngay</p>
    </div>

    <div id="error-msg">⚠️ Lỗi: Không tìm thấy dữ liệu phim! Hãy kiểm tra lại link trong Sheet.</div>

    <div class="controls-container" id="controls-ui">
        <div class="season-tabs" id="season-tabs"></div>
        <div class="episodes-grid" id="episodes-grid"></div>
    </div>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
        window.Telegram.WebApp.expand();
        let seriesData = [];

        function playEpisode(url) {
            // 🔥 ĐÒN CHÍ MẠNG: Dùng API gốc của Telegram để bật link phim thẳng ra trình duyệt nội bộ.
            // Bỏ qua mọi giới hạn Iframe, không bị Refused to connect!
            window.Telegram.WebApp.openLink(url.trim());
        }

        function renderEpisodes(seasonIdx) {
            const epsGrid = document.getElementById("episodes-grid");
            epsGrid.innerHTML = ""; 

            document.querySelectorAll('.season-btn').forEach((btn, idx) => {
                btn.classList.toggle('active', idx === seasonIdx);
            });

            const episodes = seriesData[seasonIdx].episodes;
            episodes.forEach((url, idx) => {
                const btn = document.createElement("div");
                btn.className = "ep-btn";
                btn.innerText = "Tập " + (idx + 1);
                btn.onclick = () => playEpisode(url);
                epsGrid.appendChild(btn);
            });
        }

        function initApp() {
            const urlParams = new URLSearchParams(window.location.search);
            const encodedLink = urlParams.get("link");
            
            if (!encodedLink) {
                document.getElementById("error-msg").style.display = "block"; return;
            }

            const decoded = decodeURIComponent(escape(atob(encodedLink))); 

            if (decoded.includes("||")) {
                const seasons = decoded.split("||");
                seasons.forEach((seasonStr, index) => {
                    let sName = "Phần " + (index + 1);
                    let sLinks = seasonStr;
                    
                    if (seasonStr.includes("::")) {
                        const parts = seasonStr.split("::");
                        sName = parts[0].trim();
                        sLinks = parts[1];
                    }
                    
                    const eps = sLinks.split("|").map(l => l.trim()).filter(l => l);
                    if (eps.length > 0) seriesData.push({ name: sName, episodes: eps });
                });
            } else if (decoded.includes("|")) {
                const eps = decoded.split("|").map(l => l.trim()).filter(l => l);
                seriesData.push({ name: "Danh sách Tập", episodes: eps });
            } else {
                seriesData.push({ name: "Phim Lẻ", episodes: [decoded.trim()] });
            }

            if (seriesData.length > 0) {
                document.getElementById("controls-ui").style.display = "block";
                
                const sTabs = document.getElementById("season-tabs");
                if (seriesData.length > 1) {
                    seriesData.forEach((season, idx) => {
                        const btn = document.createElement("button");
                        btn.className = "season-btn";
                        btn.innerText = season.name;
                        btn.onclick = () => renderEpisodes(idx);
                        sTabs.appendChild(btn);
                    });
                } else {
                    sTabs.style.display = "none";
                }
                
                renderEpisodes(0);
                
                // Nếu chỉ là phim lẻ (1 link duy nhất), tự động bật phim luôn không cần khách phải ấn nút
                if (seriesData.length === 1 && seriesData[0].episodes.length === 1) {
                    playEpisode(seriesData[0].episodes[0]);
                }
            } else {
                document.getElementById("error-msg").style.display = "block";
            }
        }

        initApp();
    </script>
</body>
</html>
