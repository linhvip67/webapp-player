<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🍿 Đang tải phim...</title>
    <style>
        body { background-color: #000; color: #fff; font-family: sans-serif; text-align: center; padding: 20px; margin: 0; overflow: hidden;}
        h3 { color: #f1c40f; margin-bottom: 20px; z-index: 10;}
        h4 { color: #aaa; text-align: left; border-bottom: 1px solid #333; padding-bottom: 5px; margin-top: 20px; font-size: 16px; z-index: 10;}
        .ep-container { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 10px; z-index: 10;}
        button { background-color: #1a1a1a; border: 1px solid #333; color: white; padding: 15px; border-radius: 8px; font-size: 15px; cursor: pointer; flex: 1 1 calc(33% - 10px); min-width: 80px; transition: 0.2s; z-index: 10;}
        button:active { background-color: #444; }
        #status { margin-top: 50px; font-size: 18px; z-index: 10;}
        #content { position: relative; z-index: 10; }
        
        /* 🛡️ HỆ THỐNG WATERMARK ID ĐỘNG (CHỈ BẬT KHI CHỌN TẬP) */
        #watermark {
            position: fixed;
            color: rgba(255, 255, 255, 0.15);
            font-size: 20px;
            font-weight: bold;
            font-family: monospace;
            pointer-events: none;
            user-select: none;
            z-index: 9999;
            text-shadow: 1px 1px 2px #000;
            animation: floatWatermark 25s infinite alternate ease-in-out;
            display: none; /* Ẩn đi từ đầu cho gọn */
        }

        @keyframes floatWatermark {
            0% { top: 5%; left: 5%; transform: rotate(-5deg); }
            25% { top: 80%; left: 60%; transform: rotate(10deg); }
            50% { top: 20%; left: 80%; transform: rotate(-10deg); }
            75% { top: 70%; left: 10%; transform: rotate(5deg); }
            100% { top: 40%; left: 40%; transform: rotate(0deg); }
        }
    </style>
</head>
<body>
    <div id="watermark">UID: Đang tải...</div>

    <div id="content">
        <div id="status">🍿 Đang kết nối máy chủ...</div>
    </div>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
        window.Telegram.WebApp.expand();
        
        function init() {
            const urlParams = new URLSearchParams(window.location.search);
            const encodedLink = urlParams.get("link");
            const uid = urlParams.get("uid") || "Unknown"; 

            if (!encodedLink) {
                document.getElementById("status").innerText = "⚠️ Lỗi: Không tìm thấy dữ liệu phim!";
                return;
            }

            const decoded = decodeURIComponent(escape(atob(encodedLink)));

            // ==========================================
            // 1. KỊCH BẢN PHIM LẺ: CHẠY THẲNG KHÔNG NHẢY APP
            // ==========================================
            if (!decoded.includes("|")) {
                // Tự động nhảy link luôn, không có sự kiện Click -> Điện thoại bỏ qua app OneDrive
                window.location.replace(decoded.trim());
                return;
            }

            // ==========================================
            // 2. KỊCH BẢN PHIM BỘ: DỰNG GIAO DIỆN CHỌN TẬP
            // ==========================================
            // Bật watermark lên để dọa
            document.getElementById("watermark").innerText = "AZ5_UID: " + uid;
            document.getElementById("watermark").style.display = "block";

            document.getElementById("content").innerHTML = "<h3>🎬 CHỌN TẬP PHIM</h3><div id='list'></div>";
            const listObj = document.getElementById("list");

            // Format: Mùa 2 :: Link1 | Link2 || Mùa 1 :: Link3 | Link4
            if (decoded.includes("||")) {
                const seasons = decoded.split("||");
                seasons.forEach(season => {
                    const parts = season.split("::");
                    const sName = parts.length > 1 ? parts[0].trim() : "Danh sách tập";
                    const eps = (parts.length > 1 ? parts[1] : parts[0]).split("|");

                    const heading = document.createElement("h4");
                    heading.innerText = sName;
                    listObj.appendChild(heading);

                    const container = document.createElement("div");
                    container.className = "ep-container";
                    
                    eps.forEach((ep, index) => {
                        const link = ep.trim();
                        if(link !== "") {
                            const btn = document.createElement("button");
                            btn.innerText = "Tập " + (index + 1);
                            btn.onclick = () => playEpisode(link, uid);
                            container.appendChild(btn);
                        }
                    });
                    listObj.appendChild(container);
                });
            } else {
                // Format: Link1 | Link2 | Link3
                const container = document.createElement("div");
                container.className = "ep-container";
                
                const eps = decoded.split("|");
                eps.forEach((ep, index) => {
                    const link = ep.trim();
                    if(link !== "") {
                        const btn = document.createElement("button");
                        btn.innerText = "Tập " + (index + 1);
                        btn.onclick = () => playEpisode(link, uid);
                        container.appendChild(btn);
                    }
                });
                listObj.appendChild(container);
            }
        }

        // HÀM CHUYỂN TRANG "LỪA" ĐIỆN THOẠI CHỐNG NHẢY APP
        function playEpisode(url, uid) {
            // Tắt watermark cho mượt mắt khi xem
            document.getElementById("watermark").style.display = "none";
            document.getElementById("content").innerHTML = "<div id='status'>🍿 Đang mở tập phim...</div>";
            
            // Ép mã hóa riêng link của tập này
            const encodedEp = btoa(unescape(encodeURIComponent(url)));
            
            // Reload lại đúng trang web này nhưng ngậm link phim lẻ
            // Việc reload giúp reset lại hành vi, khi trang load lại nó sẽ tự lọt vào Kịch Bản Phim Lẻ bên trên!
            window.location.replace("?link=" + encodedEp + "&uid=" + uid);
        }

        try {
            init();
        } catch (e) {
            document.getElementById("status").innerText = "⚠️ Lỗi xử lý dữ liệu!";
        }

        // Chống F12 / Copy code
        document.addEventListener('contextmenu', event => event.preventDefault());
        document.onkeydown = function(e) { if (e.keyCode == 123 || (e.ctrlKey && e.shiftKey) || e.ctrlKey) return false; }
    </script>
</body>
</html>
