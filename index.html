<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🍿 Đang tải phim...</title>
    <style>
        body { background-color: #000; color: #fff; font-family: sans-serif; text-align: center; padding: 20px; margin: 0; overflow: hidden;}
        h3 { color: #f1c40f; margin-bottom: 20px; position: relative; z-index: 10;}
        h4 { color: #aaa; text-align: left; border-bottom: 1px solid #333; padding-bottom: 5px; margin-top: 20px; font-size: 16px; position: relative; z-index: 10;}
        .ep-container { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 10px; position: relative; z-index: 10;}
        button { background-color: #1a1a1a; border: 1px solid #333; color: white; padding: 15px; border-radius: 8px; font-size: 15px; cursor: pointer; flex: 1 1 calc(33% - 10px); min-width: 80px; transition: 0.2s; position: relative; z-index: 10;}
        button:active { background-color: #444; }
        #status { margin-top: 50px; font-size: 18px; position: relative; z-index: 10;}
        #content { position: relative; z-index: 10; }
        
        /* 🛡️ HỆ THỐNG WATERMARK ID ĐỘNG CHO TRANG CHỌN TẬP */
        #watermark {
            position: fixed;
            color: rgba(255, 255, 255, 0.15); 
            font-size: 20px;
            font-weight: bold;
            font-family: monospace;
            pointer-events: none; 
            user-select: none;
            z-index: 9999;
            text-shadow: 1px 1px 2px #000;
            animation: floatWatermark 25s infinite alternate ease-in-out;
        }

        @keyframes floatWatermark {
            0% { top: 5%; left: 5%; transform: rotate(-5deg); }
            25% { top: 80%; left: 60%; transform: rotate(10deg); }
            50% { top: 20%; left: 80%; transform: rotate(-10deg); }
            75% { top: 70%; left: 10%; transform: rotate(5deg); }
            100% { top: 40%; left: 40%; transform: rotate(0deg); }
        }
    </style>
</head>
<body>
    <div id="watermark">UID: Đang tải...</div>

    <div id="content">
        <div id="status">🍿 Đang kết nối máy chủ...</div>
    </div>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
        window.Telegram.WebApp.expand();
        
        function init() {
            const urlParams = new URLSearchParams(window.location.search);
            const encodedLink = urlParams.get("link");
            const uid = urlParams.get("uid") || "Unknown"; 

            // Hiện Watermark cho giao diện chọn tập
            document.getElementById("watermark").innerText = "AZ5_UID: " + uid;

            if (!encodedLink) {
                document.getElementById("status").innerText = "⚠️ Lỗi: Không tìm thấy dữ liệu phim!";
                return;
            }

            const decoded = decodeURIComponent(escape(atob(encodedLink)));

            // 1. TRƯỜNG HỢP: LÀ PHIM LẺ HOẶC LÀ 1 TẬP CỦA PHIM BỘ (AUTO LOAD)
            // Lệnh replace này chạy tự động không cần người dùng click -> Điện thoại không gọi OneDrive
            if (!decoded.includes("|")) {
                window.location.replace(decoded.trim());
                return;
            }

            // 2. TRƯỜNG HỢP: LÀ PHIM BỘ (BÓC TÁCH LINK VÀ HIỆN NÚT)
            document.getElementById("content").innerHTML = "<h3>🎬 CHỌN TẬP PHIM</h3><div id='list'></div>";
            const listObj = document.getElementById("list");
            
            // Hàm xử lý lách luật App
            const handleEpisodeClick = (link) => {
                // Mã hóa link của 1 tập duy nhất này
                const singleLinkEncoded = btoa(unescape(encodeURIComponent(link)));
                // Tự động F5 lại chính trang web này, truyền link tập 1 vào.
                // Khi trang nạp lại, nó sẽ rơi vào TRƯỜNG HỢP 1 ở trên và auto chuyển hướng mượt mà!
                const baseUrl = window.location.href.split('?')[0]; 
                window.location.replace(baseUrl + "?link=" + singleLinkEncoded + "&uid=" + uid);
            };

            if (decoded.includes("||")) {
                const seasons = decoded.split("||");
                seasons.forEach(season => {
                    const parts = season.split("::");
                    const sName = parts.length > 1 ? parts[0].trim() : "Danh sách tập";
                    const eps = (parts.length > 1 ? parts[1] : parts[0]).split("|");

                    const heading = document.createElement("h4");
                    heading.innerText = sName;
                    listObj.appendChild(heading);

                    const container = document.createElement("div");
                    container.className = "ep-container";
                    
                    eps.forEach((ep, index) => {
                        const link = ep.trim();
                        if(link !== "") {
                            const btn = document.createElement("button");
                            btn.innerText = "Tập " + (index + 1);
                            // Gắn hàm lách luật vào nút click
                            btn.onclick = () => handleEpisodeClick(link);
                            container.appendChild(btn);
                        }
                    });
                    listObj.appendChild(container);
                });
            } else {
                const container = document.createElement("div");
                container.className = "ep-container";
                
                const eps = decoded.split("|");
                eps.forEach((ep, index) => {
                    const link = ep.trim();
                    if(link !== "") {
                        const btn = document.createElement("button");
                        btn.innerText = "Tập " + (index + 1);
                        // Gắn hàm lách luật vào nút click
                        btn.onclick = () => handleEpisodeClick(link);
                        container.appendChild(btn);
                    }
                });
                listObj.appendChild(container);
            }
        }

        try {
            init();
        } catch (e) {
            document.getElementById("status").innerText = "⚠️ Lỗi xử lý dữ liệu!";
        }

        // Chống F12, vô hiệu hóa menu chuột phải bảo vệ giao diện
        document.addEventListener('contextmenu', event => event.preventDefault());
        document.onkeydown = function(e) { if (e.keyCode == 123 || (e.ctrlKey && e.shiftKey) || e.ctrlKey) return false; }
    </script>
</body>
</html>
