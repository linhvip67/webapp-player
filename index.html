<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🍿 Đang tải phim...</title>
    <style>
        body { background-color: #000; color: #fff; font-family: sans-serif; text-align: center; padding: 20px; margin: 0; overflow: hidden;}
        h3 { color: #f1c40f; margin-bottom: 20px; z-index: 10; position: relative;}
        h4 { color: #aaa; text-align: left; border-bottom: 1px solid #333; padding-bottom: 5px; margin-top: 20px; font-size: 16px; z-index: 10; position: relative;}
        .ep-container { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 10px; z-index: 10; position: relative;}
        button { background-color: #1a1a1a; border: 1px solid #333; color: white; padding: 15px; border-radius: 8px; font-size: 15px; cursor: pointer; flex: 1 1 calc(33% - 10px); min-width: 80px; transition: 0.2s; z-index: 10; position: relative;}
        button:active { background-color: #444; }
        #status { margin-top: 50px; font-size: 18px; z-index: 10; position: relative;}
        #content { position: relative; z-index: 10; width: 100%; height: 100%; }
        
        /* 🛡️ HỆ THỐNG WATERMARK ID ĐỘNG CHỐNG RECORD MÀN HÌNH */
        #watermark {
            position: fixed;
            color: rgba(255, 255, 255, 0.15); /* Độ mờ 15%, nhìn đủ thấy nhưng không khó chịu */
            font-size: 20px;
            font-weight: bold;
            font-family: monospace;
            pointer-events: none; /* Xuyên qua nút bấm, không gây lỗi cảm ứng */
            user-select: none;
            z-index: 9999;
            text-shadow: 1px 1px 2px #000;
            animation: floatWatermark 25s infinite alternate ease-in-out;
        }

        /* Quỹ đạo bay lượn ngẫu nhiên khó bị che/crop */
        @keyframes floatWatermark {
            0% { top: 5%; left: 5%; transform: rotate(-5deg); }
            25% { top: 80%; left: 60%; transform: rotate(10deg); }
            50% { top: 20%; left: 80%; transform: rotate(-10deg); }
            75% { top: 70%; left: 10%; transform: rotate(5deg); }
            100% { top: 40%; left: 40%; transform: rotate(0deg); }
        }

        /* 🎥 Khung player dành riêng cho phim bộ để chặn nhảy sang app OneDrive ngoài */
        .player-frame {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            border: none;
            z-index: 5;
            background-color: #000;
        }
    </style>
</head>
<body>
    <div id="watermark">UID: Đang tải...</div>

    <div id="content">
        <div id="status">🍿 Đang kết nối máy chủ...</div>
    </div>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
        window.Telegram.WebApp.expand();
        
        // Hàm này chỉ gọi khi xem phim bộ để play trực tiếp trong iframe
        function playVideoEmbedded(url) {
            document.getElementById("content").innerHTML = '<iframe class="player-frame" src="' + url + '" allowfullscreen allow="autoplay; fullscreen"></iframe>';
        }

        function init() {
            const urlParams = new URLSearchParams(window.location.search);
            const encodedLink = urlParams.get("link");
            const uid = urlParams.get("uid") || "Unknown"; // Bắt ID Telegram từ Bot truyền sang

            // Hiển thị UID lên màn hình làm Watermark
            document.getElementById("watermark").innerText = "AZ5_UID: " + uid;

            if (!encodedLink) {
                document.getElementById("status").innerText = "⚠️ Lỗi: Không tìm thấy dữ liệu phim!";
                return;
            }

            const decoded = decodeURIComponent(escape(atob(encodedLink)));

            // 1. PHIM LẺ: Không chứa dấu phân tách | -> Giữ nguyên chuyển hướng gốc của bạn
            if (!decoded.includes("|")) {
                window.location.replace(decoded.trim());
                return;
            }

            // 2. PHIM BỘ: Có chứa dấu | -> Sử dụng giao diện chọn tập và nhúng iframe chặn nhảy app
            document.getElementById("content").innerHTML = "<h3>🎬 CHỌN TẬP PHIM</h3><div id='list'></div>";
            const listObj = document.getElementById("list");

            if (decoded.includes("||")) {
                const seasons = decoded.split("||");
                seasons.forEach(season => {
                    const parts = season.split("::");
                    const sName = parts.length > 1 ? parts[0].trim() : "Danh sách tập";
                    const eps = (parts.length > 1 ? parts[1] : parts[0]).split("|");

                    const heading = document.createElement("h4");
                    heading.innerText = sName;
                    listObj.appendChild(heading);

                    const container = document.createElement("div");
                    container.className = "ep-container";
                    
                    eps.forEach((ep, index) => {
                        const link = ep.trim();
                        if(link !== "") {
                            const btn = document.createElement("button");
                            btn.innerText = "Tập " + (index + 1);
                            btn.onclick = () => playVideoEmbedded(link); // Gọi iframe phát tại chỗ
                            container.appendChild(btn);
                        }
                    });
                    listObj.appendChild(container);
                });
            } else {
                const container = document.createElement("div");
                container.className = "ep-container";
                
                const eps = decoded.split("|");
                eps.forEach((ep, index) => {
                    const link = ep.trim();
                    if(link !== "") {
                        const btn = document.createElement("button");
                        btn.innerText = "Tập " + (index + 1);
                        btn.onclick = () => playVideoEmbedded(link); // Gọi iframe phát tại chỗ
                        container.appendChild(btn);
                    }
                });
                listObj.appendChild(container);
            }
        }

        try {
            init();
        } catch (e) {
            document.getElementById("status").innerText = "⚠️ Lỗi xử lý dữ liệu!";
        }

        document.addEventListener('contextmenu', event => event.preventDefault());
        document.onkeydown = function(e) { if (e.keyCode == 123 || (e.ctrlKey && e.shiftKey) || e.ctrlKey) return false; }
    </script>
</body>
</html>
