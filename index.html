<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🍿 Chọn Tập Phim</title>
    <style>
        body { background-color: #0b0f19; color: #fff; font-family: sans-serif; text-align: center; padding: 20px; margin: 0; }
        h3 { color: #f1c40f; margin-bottom: 20px; text-transform: uppercase; font-size: 20px;}
        h4 { color: #94a3b8; text-align: left; border-bottom: 1px solid #2a2e39; padding-bottom: 8px; margin-top: 25px; font-size: 16px; }
        .ep-container { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 15px; }
        button { background-color: #1c212e; border: 1px solid #2a2e39; color: white; padding: 15px; border-radius: 8px; font-size: 15px; cursor: pointer; flex: 1 1 calc(33.33% - 10px); min-width: 80px; font-weight: bold; transition: 0.2s;}
        button:active { background-color: #e50914; border-color: #e50914; transform: scale(0.95);}
        #status { margin-top: 30px; font-size: 14px; color: #94a3b8; line-height: 1.6;}
    </style>
</head>
<body>
    <div id="content">
        <div id="status">Đang nạp dữ liệu kho phim...</div>
    </div>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        
        // HÀM ÉP MICROSOFT CHẠY NỀN WEB (ẨN NÚT MỞ APP)
        function processLink(url) {
            let finalUrl = url.trim();
            if (finalUrl.includes("sharepoint.com") || finalUrl.includes("1drv.ms")) {
                if (!finalUrl.includes("web=1")) {
                    finalUrl += (finalUrl.includes("?") ? "&" : "?") + "web=1";
                }
            }
            return finalUrl;
        }

        function openMovie(url) {
            // Sử dụng API của Telegram để gọi trình duyệt nội bộ an toàn
            // Cách này trị dứt điểm lỗi Refused to connect và chặn nhảy App OneDrive cực tốt
            tg.openLink(processLink(url));
        }

        function init() {
            const encodedLink = new URLSearchParams(window.location.search).get("link");
            if (!encodedLink) {
                document.getElementById("status").innerText = "⚠️ Lỗi: Không tìm thấy dữ liệu phim!";
                return;
            }

            const decoded = decodeURIComponent(escape(atob(encodedLink)));

            // ==========================================
            // TRƯỜNG HỢP 1: PHIM LẺ
            // ==========================================
            if (!decoded.includes("|")) {
                document.getElementById("content").innerHTML = "<h3>🎬 Phim Lẻ</h3><p id='status'>🍿 Đang mở trình phát video an toàn...</p>";
                openMovie(decoded);
                return;
            }

            // ==========================================
            // TRƯỜNG HỢP 2: PHIM BỘ
            // ==========================================
            document.getElementById("content").innerHTML = "<h3>🎬 Danh sách Tập</h3><div id='list'></div><p id='status'>💡 <i>Mẹo: Sau khi bấm vào tập, phim sẽ mở ngay trong trình xem video bảo mật của Telegram. Bạn có thể xem mượt mà, tua phim thoải mái mà không lo bị lộ link gốc!</i></p>";
            const listObj = document.getElementById("list");

            if (decoded.includes("||")) {
                const seasons = decoded.split("||");
                seasons.forEach(season => {
                    const parts = season.split("::");
                    const sName = parts.length > 1 ? parts[0].trim() : "Phần phim";
                    const eps = (parts.length > 1 ? parts[1] : parts[0]).split("|");

                    const heading = document.createElement("h4");
                    heading.innerText = sName;
                    listObj.appendChild(heading);

                    const container = document.createElement("div");
                    container.className = "ep-container";
                    
                    eps.forEach((ep, index) => {
                        const link = ep.trim();
                        if(link !== "") {
                            const btn = document.createElement("button");
                            btn.innerText = "Tập " + (index + 1);
                            btn.onclick = () => openMovie(link);
                            container.appendChild(btn);
                        }
                    });
                    listObj.appendChild(container);
                });
            } else {
                const container = document.createElement("div");
                container.className = "ep-container";
                
                const eps = decoded.split("|");
                eps.forEach((ep, index) => {
                    const link = ep.trim();
                    if(link !== "") {
                        const btn = document.createElement("button");
                        btn.innerText = "Tập " + (index + 1);
                        btn.onclick = () => openMovie(link);
                        container.appendChild(btn);
                    }
                });
                listObj.appendChild(container);
            }
        }

        try {
            init();
        } catch (e) {
            document.getElementById("status").innerText = "⚠️ Lỗi xử lý dữ liệu!";
        }

        // Khóa chuột phải và F12 bảo mật
        document.addEventListener('contextmenu', event => event.preventDefault());
        document.onkeydown = function(e) { if (e.keyCode == 123 || (e.ctrlKey && e.shiftKey) || e.ctrlKey) return false; }
    </script>
</body>
</html>
