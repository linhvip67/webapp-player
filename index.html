<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🍿 Xem Phim Subteam</title>
    <style>
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background-color: #000; overflow: hidden; 
        }
        iframe { 
            width: 100%; height: 100%; border: none; 
        }
        #error-msg { 
            color: #fff; text-align: center; padding: 20px; font-family: sans-serif; display: none; margin-top: 50px;
        }
    </style>
</head>
<body>
    <iframe id="player" allow="autoplay; fullscreen" allowfullscreen></iframe>
    <div id="error-msg">⚠️ Không thể tải phim hoặc link đã hỏng.</div>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
        const tg = window.Telegram.WebApp;
        tg.expand(); // Mở rộng kịch màn hình Telegram

        function getQueryParam(param) {
            return new URLSearchParams(window.location.search).get(param);
        }

        const encodedLink = getQueryParam("link");

        if (encodedLink) {
            try {
                let decodedLink = atob(encodedLink);
                
                // MẸO TRỊ SHAREPOINT: Tự động ép link thành dạng Embed
                if (decodedLink.includes("sharepoint.com") || decodedLink.includes("onedrive.live.com")) {
                     if (decodedLink.includes("?")) {
                         decodedLink += "&action=embedview&wmode=transparent";
                     } else {
                         decodedLink += "?action=embedview&wmode=transparent";
                     }
                }
                
                document.getElementById("player").src = decodedLink;
            } catch (e) {
                document.getElementById("error-msg").style.display = "block";
                document.getElementById("player").style.display = "none";
            }
        } else {
            document.getElementById("error-msg").style.display = "block";
            document.getElementById("player").style.display = "none";
        }

        // BẢO MẬT: Chống F12, chống chuột phải để giấu link gốc
        document.addEventListener('contextmenu', event => event.preventDefault());
        document.onkeydown = function(e) {
            if (e.keyCode == 123) return false;
            if (e.ctrlKey && e.shiftKey && (e.keyCode == 'I'.charCodeAt(0) || e.keyCode == 'C'.charCodeAt(0) || e.keyCode == 'J'.charCodeAt(0))) return false;
            if (e.ctrlKey && e.keyCode == 'U'.charCodeAt(0)) return false;
        }
    </script>
</body>
</html>
