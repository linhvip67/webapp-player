<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🍿 Xem Phim Subteam</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background-color: #0b0f19; overflow-x: hidden; font-family: sans-serif; color: white;}
        
        /* KHUNG VIDEO GỐC */
        .video-container { 
            width: 100%; 
            aspect-ratio: 16/9; 
            background: #000; 
            position: relative; 
            overflow: hidden; 
            border-bottom: 2px solid #2a2e39;
        }

        /* IFRAME FULL QUYỀN */
        iframe { width: 100%; height: 100%; border: none; outline: none; position: relative; z-index: 5; }
        
        /* 🛡️ WATERMARK MỜ, CHẠY BO THEO VIỀN */
        #watermark {
            position: absolute;
            color: rgba(255, 255, 255, 0.15); 
            font-size: 15px;
            font-family: monospace;
            pointer-events: none;
            user-select: none;
            z-index: 10;
            white-space: nowrap;
            /* Chạy siêu chậm trong 60 giây */
            animation: edgeRun 60s linear infinite; 
        }

        /* Hiệu ứng chạy 4 cạnh màn hình (Không vào giữa) */
        @keyframes edgeRun {
            0%   { top: 5%; left: 5%; transform: translateX(0); }
            25%  { top: 5%; left: 95%; transform: translateX(-100%); }
            50%  { top: 85%; left: 95%; transform: translateX(-100%); }
            75%  { top: 85%; left: 5%; transform: translateX(0); }
            100% { top: 5%; left: 5%; transform: translateX(0); }
        }

        /* GIAO DIỆN CHỌN TẬP */
        .controls-container { padding: 20px; display: none; }
        h3 { color: #f1c40f; margin: 0 0 15px 0; text-transform: uppercase; font-size: 16px;}
        .season-block { margin-bottom: 25px; }
        .season-title { color: #94a3b8; border-bottom: 1px solid #2a2e39; padding-bottom: 8px; margin-bottom: 15px; font-size: 15px; font-weight: bold;}
        
        .episodes-grid { display: flex; flex-wrap: wrap; gap: 10px; }
        .ep-btn { background: #1c212e; border: 1px solid #2a2e39; color: #fff; padding: 12px; border-radius: 8px; cursor: pointer; text-align: center; font-size: 14px; flex: 1 1 calc(25% - 10px); box-sizing: border-box; min-width: 70px; font-weight: bold; transition: 0.2s;}
        .ep-btn:active { transform: scale(0.95); }
        .ep-btn.playing { background: #e50914; color: #fff; border-color: #e50914; font-weight: bold; }
    </style>
</head>
<body>

    <div class="video-container" id="vid-container">
        <div id="watermark">UID: Đang tải...</div>
        
        <iframe id="video-frame" src="" allow="autoplay; fullscreen" allowfullscreen="true" webkitallowfullscreen="true" mozallowfullscreen="true" sandbox="allow-scripts allow-same-origin allow-presentation"></iframe>
    </div>
    
    <div class="controls-container" id="controls-ui">
        <h3>🎬 Danh sách tập:</h3>
        <div id="episodes-wrapper"></div>
    </div>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
        window.Telegram.WebApp.expand();
        const urlParams = new URLSearchParams(window.location.search);
        document.getElementById("watermark").innerText = "AZ5_UID: " + (urlParams.get("uid") || "Ẩn_Danh");

        // Rửa link: Xóa rác và gắn lệnh ép nhúng của Microsoft
        function formatEmbedUrl(url) {
            let cleanUrl = url.trim();
            // Lọc src nếu dán nhầm thẻ iframe
            if (cleanUrl.toLowerCase().startsWith("<iframe")) {
                const match = cleanUrl.match(/src=["'](.*?)["']/);
                if (match && match[1]) cleanUrl = match[1];
            }
            
            // Xóa query đằng sau (nếu có) để không bị xung đột
            cleanUrl = cleanUrl.split('?')[0]; 
            
            // Ép lệnh phát Iframe
            return cleanUrl + "?action=embedview&wmode=transparent";
        }

        function playEpisode(url, epBtn) {
            document.getElementById("video-frame").src = formatEmbedUrl(url);
            document.querySelectorAll('.ep-btn').forEach(btn => btn.classList.remove('playing'));
            if(epBtn) epBtn.classList.add('playing');
        }

        function init() {
            const encodedLink = urlParams.get("link");
            if(!encodedLink) return;

            const decoded = decodeURIComponent(escape(atob(encodedLink))); 
            const wrapper = document.getElementById("episodes-wrapper");
            
            let firstEpUrl = null;
            let firstEpBtn = null;

            // KỊCH BẢN 1: PHIM BỘ CÓ NHIỀU MÙA (Có ký tự ||)
            if (decoded.includes("||")) {
                document.getElementById("controls-ui").style.display = "block";
                const seasons = decoded.split("||"); // Cắt từng mùa
                
                seasons.forEach((seasonData, sIdx) => {
                    let sName = "Phần " + (sIdx + 1);
                    let sLinks = seasonData;

                    // Nếu có tên mùa (Ký tự ::)
                    if (seasonData.includes("::")) {
                        const parts = seasonData.split("::");
                        sName = parts[0].trim();
                        sLinks = parts[1];
                    }

                    const eps = sLinks.split("|").map(l => l.trim()).filter(l => l);
                    
                    if (eps.length > 0) {
                        const block = document.createElement("div");
                        block.className = "season-block";
                        
                        const title = document.createElement("div");
                        title.className = "season-title";
                        title.innerText = sName;
                        block.appendChild(title);
                        
                        const grid = document.createElement("div");
                        grid.className = "episodes-grid";
                        
                        eps.forEach((url, eIdx) => {
                            const btn = document.createElement("div");
                            btn.className = "ep-btn";
                            btn.innerText = "Tập " + (eIdx + 1);
                            btn.onclick = () => playEpisode(url, btn);
                            grid.appendChild(btn);
                            
                            if (!firstEpUrl) { firstEpUrl = url; firstEpBtn = btn; }
                        });
                        
                        block.appendChild(grid);
                        wrapper.appendChild(block);
                    }
                });
            } 
            // KỊCH BẢN 2: PHIM BỘ CHỈ CÓ TẬP (Chỉ có |)
            else if (decoded.includes("|")) {
                document.getElementById("controls-ui").style.display = "block";
                const eps = decoded.split("|").map(l => l.trim()).filter(l => l);
                
                const grid = document.createElement("div");
                grid.className = "episodes-grid";
                
                eps.forEach((url, idx) => {
                    const btn = document.createElement("div");
                    btn.className = "ep-btn";
                    btn.innerText = "Tập " + (idx + 1);
                    btn.onclick = () => playEpisode(url, btn);
                    grid.appendChild(btn);
                    
                    if (!firstEpUrl) { firstEpUrl = url; firstEpBtn = btn; }
                });
                wrapper.appendChild(grid);
            } 
            // KỊCH BẢN 3: PHIM LẺ
            else {
                firstEpUrl = decoded.trim();
            }

            // Phát ngay tập đầu tiên tìm thấy
            if (firstEpUrl) {
                playEpisode(firstEpUrl, firstEpBtn);
            }
        }
        
        init();

        // Khóa phím, khóa chuột phải bảo vệ WebApp
        document.addEventListener('contextmenu', event => event.preventDefault());
    </script>
</body>
</html>
