<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🍿 Chọn Tập Phim</title>
    <style>
        body { background-color: #0b0f19; color: #fff; font-family: sans-serif; text-align: center; padding: 20px; margin: 0; }
        h3 { color: #f1c40f; margin-bottom: 20px; text-transform: uppercase;}
        h4 { color: #94a3b8; text-align: left; border-bottom: 1px solid #2a2e39; padding-bottom: 8px; margin-top: 25px; font-size: 16px; }
        .ep-container { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 15px; }
        button { background-color: #1c212e; border: 1px solid #2a2e39; color: white; padding: 15px; border-radius: 8px; font-size: 15px; cursor: pointer; flex: 1 1 calc(33.33% - 10px); min-width: 80px; font-weight: bold; transition: 0.2s;}
        button:active { background-color: #e50914; border-color: #e50914; transform: scale(0.95);}
        #status { margin-top: 50px; font-size: 18px; color: #94a3b8;}
        /* Loader xoay lúc chờ tự động chuyển hướng */
        .loader { border: 4px solid #1c212e; border-top: 4px solid #e50914; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 40px auto 15px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div id="content">
        <div class="loader" id="spinner"></div>
        <div id="status">Đang nạp luồng video...</div>
    </div>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
        window.Telegram.WebApp.expand();
        
        function init() {
            const encodedLink = new URLSearchParams(window.location.search).get("link");
            if (!encodedLink) {
                document.getElementById("status").innerText = "⚠️ Lỗi: Không tìm thấy dữ liệu phim!";
                document.getElementById("spinner").style.display = "none";
                return;
            }

            const decoded = decodeURIComponent(escape(atob(encodedLink)));

            // ==========================================
            // TRƯỜNG HỢP 1: PHIM LẺ (HOẶC TẬP ĐÃ CHỌN)
            // ==========================================
            if (!decoded.includes("|")) {
                let finalUrl = decoded.trim();
                
                // Mẹo ép Microsoft không được gọi App (Ép chạy nền Web)
                if (finalUrl.includes("sharepoint.com") || finalUrl.includes("1drv.ms")) {
                    if (!finalUrl.includes("web=1")) {
                        finalUrl += (finalUrl.includes("?") ? "&" : "?") + "web=1";
                    }
                }
                
                // Tự động chuyển hướng ngay lập tức -> Điện thoại sẽ không gọi App OneDrive
                window.location.replace(finalUrl);
                return;
            }

            // ==========================================
            // TRƯỜNG HỢP 2: PHIM BỘ (HIỂN THỊ NÚT BẤM)
            // ==========================================
            document.getElementById("content").innerHTML = "<h3>🎬 Danh sách Tập</h3><div id='list'></div>";
            const listObj = document.getElementById("list");

            // Phim có chia mùa (Mùa 1 :: link | link || Mùa 2 :: link | link)
            if (decoded.includes("||")) {
                const seasons = decoded.split("||");
                seasons.forEach(season => {
                    const parts = season.split("::");
                    const sName = parts.length > 1 ? parts[0].trim() : "Phần phim";
                    const eps = (parts.length > 1 ? parts[1] : parts[0]).split("|");

                    const heading = document.createElement("h4");
                    heading.innerText = sName;
                    listObj.appendChild(heading);

                    const container = document.createElement("div");
                    container.className = "ep-container";
                    
                    eps.forEach((ep, index) => {
                        const link = ep.trim();
                        if(link !== "") {
                            const btn = document.createElement("button");
                            btn.innerText = "Tập " + (index + 1);
                            
                            // THUẬT TOÁN BYPASS: Tải lại trang WebApp với link tập thay vì chuyển thẳng
                            btn.onclick = () => {
                                document.getElementById("content").innerHTML = "<div class='loader'></div><div id='status'>Đang kết nối...</div>";
                                const epEncoded = btoa(unescape(encodeURIComponent(link)));
                                window.location.replace("?link=" + epEncoded);
                            };
                            container.appendChild(btn);
                        }
                    });
                    listObj.appendChild(container);
                });
            } 
            // Phim bộ thông thường (link | link | link)
            else {
                const container = document.createElement("div");
                container.className = "ep-container";
                
                const eps = decoded.split("|");
                eps.forEach((ep, index) => {
                    const link = ep.trim();
                    if(link !== "") {
                        const btn = document.createElement("button");
                        btn.innerText = "Tập " + (index + 1);
                        
                        btn.onclick = () => {
                            document.getElementById("content").innerHTML = "<div class='loader'></div><div id='status'>Đang kết nối...</div>";
                            const epEncoded = btoa(unescape(encodeURIComponent(link)));
                            window.location.replace("?link=" + epEncoded);
                        };
                        container.appendChild(btn);
                    }
                });
                listObj.appendChild(container);
            }
        }

        try {
            init();
        } catch (e) {
            document.getElementById("status").innerText = "⚠️ Lỗi xử lý dữ liệu!";
            document.getElementById("spinner").style.display = "none";
        }

        // Chặn copy/inspect bậy bạ
        document.addEventListener('contextmenu', event => event.preventDefault());
        document.onkeydown = function(e) { if (e.keyCode == 123 || (e.ctrlKey && e.shiftKey) || e.ctrlKey) return false; }
    </script>
</body>
</html>
